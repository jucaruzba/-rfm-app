<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div style="text-align: center; font-family: Arial, sans-serif;">
        <img src="cid:logo" alt="RFM Logo" style="width: 150px; margin-bottom: 20px;">
        <h1 style="color: #333;">System - Password Recovery</h1>
        <p>Hello <span th:text="${username}" style="font-weight: bold;">User</span>,</p>
        <p>You have requested a password reset. Your temporary password is:</p>
        <div style="background-color: #f4f4f4; padding: 10px; display: inline-block; font-size: 20px; border: 1px solid #ddd;">
            <b th:text="${tempPass}">PASSWORD123</b>
        </div>
        <p style="color: #666; font-size: 14px;">Please change it as soon as you log in for security reasons.</p>
    </div>
</body>
</html>
